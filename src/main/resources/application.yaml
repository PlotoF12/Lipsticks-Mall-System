spring:
  application:
    name: lipsticks
  datasource:
    url: jdbc:mysql://localhost:3306/Lipsticks?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: 0123456789abcdef0123456789abcdef
  expiration-ms: 86400000

langchain4j:
  open-ai:
    chat-model:
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      base-url: https://api.deepseek.com
      model-name: deepseek-chat
      temperature: 0.7
      max-tokens: 1024
